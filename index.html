      tailwind.config = {

            keyframes: {
              slideUp: {

              slideInBottom: {
                '0%': { transform: 'translateY(100%)' },
                '100%': { transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              scaleIn: {
                '0%': { transform: 'scale(0.97)', opacity: '0' },

    <style>
      :root {
        --bg-page:       #f0efec;
        --bg-card:       #f5f5f0;

        --border:        #d6d5d0;
        --border-strong: #a0a09a;
        --text-primary:  #0d0d0b;

      }

      .dark {
        --bg-page:       #0a0a08;

        --bg-subtle:     #1a1a18;
        --border:        #2a2a28;
        --border-strong: #3a3a38;
        --text-primary:  #f0efec;
        --text-secondary:#8a8a82;
        --text-muted:    #8a8a82;
      }

      body {
        background-color: var(--bg-page);
        color: var(--text-primary);
        font-family: 'Geist', sans-serif;
        min-height: 100vh;
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      /* Safe Area Utilities */
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      .pt-safe { padding-top: env(safe-area-inset-top); }

      /* Thin Scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Corner mark decoration for cards */
      /* WCAG 2.4.7: Global focus-visible for all interactive elements */
      button:focus-visible,
      a:focus-visible,
      select:focus-visible,
      [role="button"]:focus-visible {
        outline: 2px solid #5dde4a;
        outline-offset: 2px;
      }
      /* Inputs already have ring styles, skip outline to avoid double ring */
      input:focus-visible,
      textarea:focus-visible {
        outline: none;
      }

      .corner-mark {
        position: relative;
      }
      .corner-mark::before,
      .corner-mark::after {
        content: '■';
        position: absolute;
        font-size: 4px;
        color: var(--border-strong);
        line-height: 1;
      }
      .corner-mark::before { top: 8px; left: 8px; }
      .corner-mark::after { bottom: 8px; right: 8px; }

      /* Number input spinners — style for dark mode */
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button {
        opacity: 1;
        background: var(--bg-subtle);
        border-left: 1px solid var(--border);
        border-radius: 0 2px 2px 0;
        cursor: pointer;
      }

      /* Reduced Motion — respects user OS preference */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
